<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1124"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="340" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="halogen" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="traceglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.045" stroke="white" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Ambient glow behind lens -->
  <circle cx="220" cy="205" r="155" fill="#3b82f6" filter="url(#halogen)" opacity="0.18"/>

  <!-- Lens fill -->
  <circle cx="220" cy="205" r="120" fill="#3b82f6" opacity="0.07"/>

  <!-- Lens ring -->
  <circle cx="220" cy="205" r="120" fill="none" stroke="url(#lensGrad)" stroke-width="20" filter="url(#glow)"/>

  <!-- Handle -->
  <line x1="309" y1="294" x2="398" y2="386"
        stroke="url(#lensGrad)" stroke-width="26" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Handle accent dot at junction -->
  <circle cx="309" cy="294" r="13" fill="#818cf8" filter="url(#glow)"/>

  <!-- Inner text: <S/> -->
  <text x="222" y="232" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="80" font-weight="700">
    <tspan fill="#60a5fa">&lt;</tspan><tspan fill="white">S</tspan><tspan fill="#60a5fa">/&gt;</tspan>
  </text>

  <!-- Signal trace line in lens -->
  <g filter="url(#traceglow)">
    <circle cx="154" cy="264" r="5" fill="#22d3ee"/>
    <line x1="159" y1="264" x2="186" y2="264" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.9"/>
    <circle cx="196" cy="264" r="5" fill="#22d3ee"/>
    <line x1="201" y1="264" x2="233" y2="264" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.9"/>
    <circle cx="243" cy="264" r="5" fill="#22d3ee"/>
    <line x1="248" y1="264" x2="278" y2="264" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.9"/>
    <circle cx="288" cy="264" r="5" fill="#22d3ee"/>
  </g>

  <!-- Sparkle top-right -->
  <g fill="#818cf8" opacity="0.55" filter="url(#glow)">
    <polygon points="388,68 392,80 404,84 392,88 388,100 384,88 372,84 384,80" />
  </g>

  <!-- Sparkle left -->
  <g fill="#60a5fa" opacity="0.35" filter="url(#glow)">
    <polygon points="72,168 75,176 83,179 75,182 72,190 69,182 61,179 69,176"/>
  </g>

  <!-- Divider -->
  <line x1="72" y1="378" x2="440" y2="378" stroke="white" stroke-width="0.6" opacity="0.12"/>

  <!-- AWESOME label -->
  <text x="256" y="416" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="18" font-weight="300" fill="#94a3b8" letter-spacing="10">AWESOME</text>

  <!-- SAML TRACER label -->
  <text x="256" y="465" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="44" font-weight="800" fill="white" letter-spacing="2">SAML TRACER</text>
</svg>
