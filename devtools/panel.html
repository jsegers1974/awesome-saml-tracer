<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SAML Tracer</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body class="panel">
  <header>
    <h1>SAML</h1>
    <span id="status" class="muted"></span>
    <div class="actions">
      <button id="open-viewer" class="ghost">Open viewer</button>
      <button id="open-jwt" class="ghost">JWT decoder</button>
      <button id="clear">Clear</button>
    </div>
  </header>
  <div class="layout">
    <ul id="entries" class="entry-list"></ul>
    <section id="detail" class="detail">
      <p class="empty">Select a SAML capture to inspect.</p>
    </section>
  </div>
  <script type="module" src="panel.js"></script>
</body>
</html>
